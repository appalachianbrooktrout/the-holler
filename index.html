<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>appalachian brook trout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            background-color: #050505 !important;
            color: #d9d0c1;
            font-family: "Courier New", monospace;
            height: 100vh; width: 100vw;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .gate {
            position: relative;
            max-width: 500px; width: 85%;
            padding: 80px 40px;
            background: #050505;
            border: 2px solid #2f3621;
            box-shadow: 0 0 80px rgba(0,0,0,1), inset 0 0 60px rgba(0,0,0,1);
            text-align: center;
            z-index: 10; overflow: hidden;
        }

        .fog-overlay {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 40%),
                        radial-gradient(circle, rgba(255,255,255,0.05) 10%, transparent 60%);
            animation: fogMove 12s ease-in-out infinite;
            pointer-events: none; z-index: -1; filter: blur(20px);
        }

        @keyframes fogMove {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-5%, 10%) scale(1.1); }
            66% { transform: translate(10%, -5%) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        h1 { font-size: 28px; letter-spacing: 8px; line-height: 1.5; margin-bottom: 50px; text-transform: lowercase; opacity: 0.9; }

        .enter-btn {
            background: transparent; border: 1px solid #4a1c1c; color: #d9d0c1;
            padding: 18px 40px; font-size: 11px; letter-spacing: 5px;
            text-transform: uppercase; cursor: pointer; transition: 0.6s; outline: none;
        }
        .enter-btn:hover { background: #4a1c1c; color: #000; }

        /* THE LINE-UP RE-FIX */
        #archive {
            display: none;
            margin: 50px auto 0 auto;
            width: fit-content; /* this centers the block itself */
            text-align: left; /* but makes the crosses inside line up vertically */
            animation: extraSlowFade 4s ease-in-out forwards;
        }

        @keyframes extraSlowFade { 
            0% { opacity: 0; transform: translateY(5px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .haunted-link {
            display: block;
            margin: 25px 0;
            color: #d9d0c1;
            text-decoration: none;
            font-size: 18px;
            opacity: 0.5;
            transition: 0.8s;
            white-space: nowrap; 
        }
        .haunted-link:hover { opacity: 1; color: #7c0a0a; letter-spacing: 4px; }

        #yt-player { position: absolute; visibility: hidden; }
    </style>
</head>
<body>

    <div class="gate">
        <div class="fog-overlay"></div>

        <div id="intro">
            <h1>appalachian<br>brook<br>trout</h1>
            <button class="enter-btn" onclick="enterTheWoods()">[ enter the woods ]</button>
            <p style="font-size:9px; opacity:0.3; margin-top:20px; letter-spacing: 3px;">(sound on)</p>
        </div>

        <div id="archive">
            <a href="https://www.instagram.com/appalachianbrooktrout" target="_blank" class="haunted-link">† instagram</a>
            <a href="https://music.youtube.com/channel/UCIdw9hTTV9IcE5jUqVFBECQ" target="_blank" class="haunted-link">† hymns</a>
            <a href="https://www.tiktok.com/@appalachianbrooktrout" target="_blank" class="haunted-link">† prophecies</a>
            <a href="YOUR_TUMBLR_URL" target="_blank" class="haunted-link">† tumblr</a>
            <a href="YOUR_PAYPAL_URL" target="_blank" class="haunted-link">† offerings</a>
        </div>
    </div>

    <div id="yt-player"></div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '1', width: '1', videoId: 'url-4QxhQ9o',
                playerVars: { 'autoplay': 1, 'controls': 0, 'loop': 1, 'playlist': 'url-4QxhQ9o', 'playsinline': 1 },
                events: { 'onReady': function(e) { e.target.mute(); e.target.playVideo(); } }
            });
        }

        function enterTheWoods() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('archive').style.display = 'block';
            if (player) {
                player.unMute();
                player.setVolume(50);
                player.playVideo();
            }
        }
    </script>
</body>
</html>
