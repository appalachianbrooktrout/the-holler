<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>appalachian brook trout</title>
    <style>
        /* standard reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* the void */
        body, html {
            background-color: #050505 !important;
            color: #d9d0c1;
            font-family: "Courier New", monospace;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* the actual gate box */
        .gate {
            position: relative;
            max-width: 500px;
            width: 85%;
            padding: 60px 40px;
            background: radial-gradient(circle at top, #0b0f0a 0%, #050505 80%);
            border: 1px solid #2f3621;
            box-shadow: 0 0 50px rgba(0,0,0,0.9), inset 0 0 30px rgba(0,0,0,0.8);
            text-align: center;
            z-index: 10;
        }

        /* the fog (fixed animation) */
        .fog-overlay {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 50%);
            animation: fogMove 20s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes fogMove {
            0% { transform: translate(0, 0); }
            50% { transform: translate(-5%, 5%); }
            100% { transform: translate(0, 0); }
        }

        h1 {
            font-size: 24px;
            letter-spacing: 6px;
            text-transform: lowercase;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        /* button vibes */
        .enter-btn {
            background: transparent;
            border: 1px solid #4a1c1c;
            color: #d9d0c1;
            padding: 15px 35px;
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.5s;
        }
        .enter-btn:hover {
            background: #4a1c1c;
            color: #000;
        }

        /* hidden archive */
        #archive {
            display: none;
            margin-top: 40px;
            animation: fadeIn 2s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .haunted-link {
            display: block;
            margin: 20px 0;
            color: #d9d0c1;
            text-decoration: none;
            font-size: 16px;
            opacity: 0.6;
            transition: 0.4s;
        }
        .haunted-link:hover {
            opacity: 1;
            color: #7c0a0a;
            letter-spacing: 5px;
        }

        #yt-player { position: absolute; visibility: hidden; }
    </style>
</head>
<body>

    <div class="gate">
        <div class="fog-overlay"></div>

        <div id="intro">
            <h1>appalachian brook trout</h1>
            <button class="enter-btn" onclick="enterTheWoods()">[ enter the woods ]</button>
            <p style="font-size:8px; opacity:0.3; margin-top:15px; letter-spacing: 2px;">(sound on)</p>
        </div>

        <div id="archive">
            <a href="https://www.instagram.com/appalachianbrooktrout?igsh=NTc4MTIwNjQ2YQ%3D%3D&utm_source=qr" target="_blank" class="haunted-link">† instagram</a>
            <a href="https://music.youtube.com/channel/UCIdw9hTTV9IcE5jUqVFBECQ?si=LyljXTzTjjD2noK2" target="_blank" class="haunted-link">† hymns</a>
            <a href="YOUR_TUMBLR_URL" target="_blank" class="haunted-link">† tumblr</a>
            <a href="YOUR_PAYPAL_URL" target="_blank" class="haunted-link">† offerings</a>
        </div>
    </div>

    <div id="yt-player"></div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '1',
                width: '1',
                videoId: 'url-4QxhQ9o',
                playerVars: { 'autoplay': 1, 'controls': 0, 'loop': 1, 'playlist': 'url-4QxhQ9o', 'playsinline': 1 },
                events: { 'onReady': function(e) { e.target.mute(); e.target.playVideo(); } }
            });
        }

        function enterTheWoods() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('archive').style.display = 'block';
            if (player) {
                player.unMute();
                player.setVolume(40);
                player.playVideo();
            }
        }
    </script>
</body>
</html>
